# TLS termination for psyrag serve (the server itself speaks plain HTTP).
# Adjust names/paths; pair with `psyrag serve --addr 127.0.0.1:8080 --token ...`.
server {
    listen 443 ssl;
    http2 on;
    server_name psyrag.example.com;

    ssl_certificate     /etc/letsencrypt/live/psyrag.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psyrag.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # psyrag caps request bodies itself (--max-body-mb, default 32);
    # keep the proxy limit aligned so oversize is rejected at the edge.
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name psyrag.example.com;
    return 301 https://$host$request_uri;
}
