# cargo-deny configuration: supply-chain policy for the (deliberately tiny)
# dependency tree. `cargo deny check` runs in CI.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
