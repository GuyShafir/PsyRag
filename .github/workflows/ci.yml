name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --workspace
      - name: Unit + integration tests (incl. golden suite + format fixture zoo)
        run: cargo test --workspace
      - name: End-to-end smoke suite
        run: bash scripts/smoke.sh
      - name: kill -9 crash-recovery suite (acked-write durability)
        run: bash scripts/crash.sh 5
      - name: load/soak with SLO assertions (from Prometheus histograms)
        run: bash scripts/load.sh 15 8

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: cargo deny (advisories, licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
      - name: SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: psyrag-sbom.spdx.json
